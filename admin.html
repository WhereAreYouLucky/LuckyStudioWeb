<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Things Pastane — Yönetim Paneli</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#111;--bg2:#1a1a1a;--bg3:#222;--bg4:#2a2a2a;
  --fg:#f0ece4;--fg2:#a8a090;--fg3:#6a6458;
  --accent:#c8a96a;--accent2:#e0c080;
  --red:#e05454;--green:#5aaa5a;
  --radius:12px;--radius-sm:8px;
  --sans:"DM Sans",system-ui,sans-serif;
  --mono:"DM Mono",ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--fg);font-family:var(--sans);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
::selection{background:var(--accent);color:#111}
a{color:var(--accent);text-decoration:none}
a:hover{color:var(--accent2)}

/* Layout */
.shell{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
@media(max-width:860px){
  .shell{grid-template-columns:1fr}
  .sidebar{position:fixed;inset:0;z-index:100;transform:translateX(-100%);transition:transform .3s cubic-bezier(.2,.8,.2,1);width:280px}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay{display:none;position:fixed;inset:0;z-index:99;background:rgba(0,0,0,.5)}
  .sidebar-overlay.open{display:block}
  .mobile-header{display:flex !important}
}

/* Sidebar */
.sidebar{background:var(--bg2);border-right:1px solid rgba(255,255,255,.06);padding:24px 0;position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column}
.sidebar-brand{padding:0 24px 28px;display:flex;align-items:center;gap:12px;font-size:18px;font-weight:600}
.sidebar-brand .mark{width:36px;height:36px;border-radius:50%;background:var(--accent);color:#111;display:grid;place-items:center;font-size:18px;font-weight:700}
.sidebar-brand span{color:var(--fg2);font-weight:400;font-size:14px;margin-left:2px}
.nav-group{margin-bottom:8px}
.nav-group-label{padding:8px 24px;font-size:11px;font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase;color:var(--fg3)}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 24px;font-size:14px;color:var(--fg2);cursor:pointer;transition:background .15s,color .15s;border:none;background:none;width:100%;text-align:left;font-family:inherit}
.nav-item:hover{background:rgba(255,255,255,.04);color:var(--fg)}
.nav-item.active{background:rgba(200,169,106,.1);color:var(--accent);font-weight:500}
.nav-item .icon{width:20px;text-align:center;font-size:16px;flex-shrink:0}
.sidebar-foot{margin-top:auto;padding:20px 24px;border-top:1px solid rgba(255,255,255,.06)}
.sidebar-foot a{font-size:13px;color:var(--fg3);display:flex;align-items:center;gap:8px}
.sidebar-foot a:hover{color:var(--fg)}

/* Mobile header */
.mobile-header{display:none;align-items:center;gap:12px;padding:14px 20px;
  background:var(--bg2);border-bottom:1px solid rgba(255,255,255,.06);position:sticky;top:0;z-index:50}
.mobile-header .mark{width:32px;height:32px;border-radius:50%;background:var(--accent);color:#111;
  display:grid;place-items:center;font-size:16px;font-weight:700}
.mobile-header .title{font-size:16px;font-weight:600;flex:1}
.mobile-header .hamburger{background:none;border:none;width:36px;height:36px;padding:0;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;order:-1}
.mobile-header .hamburger span{display:block;width:20px;height:2px;background:var(--fg);border-radius:2px}

/* Main */
.main{padding:32px 40px 60px;max-width:1100px}
@media(max-width:860px){.main{padding:24px 20px 40px}}
.page{display:none}
.page.active{display:block}
.page-title{font-size:28px;font-weight:700;margin-bottom:6px}
.page-desc{color:var(--fg2);margin-bottom:32px}

/* Card */
.card{background:var(--bg2);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius);padding:24px;margin-bottom:20px}
.card-title{font-size:16px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.card-title .badge{font-size:11px;font-family:var(--mono);background:var(--bg4);padding:4px 10px;border-radius:999px;color:var(--fg2);font-weight:400}

/* Form */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:640px){.form-grid{grid-template-columns:1fr}}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group.full{grid-column:1/-1}
.form-label{font-size:12px;font-family:var(--mono);letter-spacing:.04em;color:var(--fg2);font-weight:500}
.form-input,.form-select,.form-textarea{
  background:var(--bg3);border:1px solid rgba(255,255,255,.08);border-radius:var(--radius-sm);
  padding:10px 14px;color:var(--fg);font-family:var(--sans);font-size:14px;outline:none;
  transition:border-color .2s,background .2s}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent);background:var(--bg4)}
.form-textarea{resize:vertical;min-height:80px}
.form-select{cursor:pointer}
.form-hint{font-size:11px;color:var(--fg3);margin-top:2px}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:8px;height:40px;padding:0 20px;border-radius:var(--radius-sm);
  font-size:13px;font-weight:600;border:none;cursor:pointer;transition:background .2s,transform .15s;font-family:var(--sans)}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#111}
.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:var(--bg4);color:var(--fg);border:1px solid rgba(255,255,255,.1)}
.btn-secondary:hover{background:var(--bg3)}
.btn-danger{background:rgba(224,84,84,.15);color:var(--red);border:1px solid rgba(224,84,84,.2)}
.btn-danger:hover{background:rgba(224,84,84,.25)}
.btn-sm{height:32px;padding:0 14px;font-size:12px;border-radius:6px}
.btn-group{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}

/* Drag & drop */
.drag-handle{cursor:grab;color:var(--fg3);font-size:20px;padding:4px 8px;user-select:none;display:flex;align-items:center;transition:color .2s}
.drag-handle:hover{color:var(--accent)}
.drag-handle:active{cursor:grabbing}
[data-list].dragging{opacity:.5;border-color:var(--accent) !important;background:var(--bg4) !important;pointer-events:none}
[data-list].drag-over-above{box-shadow:0 -3px 0 0 var(--accent)}
[data-list].drag-over-below{box-shadow:0 3px 0 0 var(--accent)}
.drag-ghost{position:fixed;pointer-events:none;z-index:10000;opacity:.85;transform:rotate(1deg);box-shadow:0 12px 40px rgba(0,0,0,.5);border:2px solid var(--accent);border-radius:var(--radius)}
body.is-dragging{user-select:none;cursor:grabbing !important}
body.is-dragging *{cursor:grabbing !important}

/* Image upload */
.img-upload{position:relative;width:100%;aspect-ratio:5/4;border-radius:var(--radius-sm);border:2px dashed rgba(255,255,255,.1);
  background:var(--bg3);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
  cursor:pointer;transition:border-color .2s,background .2s;overflow:hidden}
.img-upload:hover{border-color:var(--accent);background:var(--bg4)}
.img-upload.has-img{border-style:solid;border-color:rgba(255,255,255,.06)}
.img-upload img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.img-upload .overlay{position:absolute;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .2s;gap:8px}
.img-upload:hover .overlay{opacity:1}
.img-upload input{display:none}
.img-upload .placeholder{color:var(--fg3);font-size:13px;text-align:center}
.img-upload .placeholder .icon{font-size:28px;margin-bottom:4px;display:block}

/* Menu item row */
.menu-item{background:var(--bg3);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius);
  padding:16px;margin-bottom:12px;display:grid;grid-template-columns:auto 100px 1fr auto;gap:16px;align-items:center;
  transition:border-color .2s,opacity .2s,box-shadow .2s}
.menu-item:hover{border-color:rgba(255,255,255,.12)}
.menu-item .thumb{width:100px;height:80px;border-radius:8px;overflow:hidden;background:var(--bg4);flex-shrink:0;position:relative}
.menu-item .thumb img{width:100%;height:100%;object-fit:cover}
.menu-item .thumb .grad{width:100%;height:100%;position:absolute;inset:0}
.menu-item .info h4{font-size:15px;font-weight:600;margin-bottom:4px}
.menu-item .info .meta{font-size:12px;color:var(--fg2);display:flex;gap:12px;flex-wrap:wrap}
.menu-item .info .meta span{display:flex;align-items:center;gap:4px}
.menu-item .actions{display:flex;gap:8px;flex-shrink:0}
@media(max-width:640px){.menu-item{grid-template-columns:auto 1fr;gap:12px}.menu-item .thumb{width:100%;height:120px;grid-column:1/-1}.menu-item .info{grid-column:1/-1}.menu-item .actions{grid-column:1/-1}}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg2);border:1px solid rgba(255,255,255,.1);
  border-radius:var(--radius);padding:14px 20px;font-size:14px;z-index:9999;
  transform:translateY(80px);opacity:0;transition:transform .3s,opacity .3s;
  display:flex;align-items:center;gap:10px;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{border-color:rgba(90,170,90,.3)}
.toast.success::before{content:"✓";color:var(--green);font-weight:700}
.toast.error{border-color:rgba(224,84,84,.3)}
.toast.error::before{content:"✕";color:var(--red);font-weight:700}

/* Color picker */
.color-row{display:flex;gap:8px;align-items:center}
.color-swatch{width:36px;height:36px;border-radius:8px;border:2px solid rgba(255,255,255,.1);cursor:pointer;padding:0;overflow:hidden}
.color-swatch input{opacity:0;width:100%;height:100%;cursor:pointer}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal{background:var(--bg2);border:1px solid rgba(255,255,255,.08);border-radius:16px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;padding:28px}
.modal-title{font-size:20px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}
.modal-close{background:none;border:none;color:var(--fg2);font-size:20px;cursor:pointer;width:32px;height:32px;border-radius:8px;display:grid;place-items:center}
.modal-close:hover{background:rgba(255,255,255,.06);color:var(--fg)}

/* Stat cards */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:12px}
@media(max-width:640px){.stats-row{grid-template-columns:1fr 1fr}}
.stat-card{display:flex;flex-direction:column;gap:4px}

/* Login */
.login-overlay{position:fixed;inset:0;z-index:10000;background:var(--bg);
  display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{width:100%;max-width:380px;text-align:center}
.login-box .mark{width:64px;height:64px;border-radius:50%;background:var(--accent);color:#111;
  display:grid;place-items:center;font-size:32px;font-weight:700;margin:0 auto 24px}
.login-box h2{font-size:24px;font-weight:700;margin-bottom:6px}
.login-box .sub{color:var(--fg2);font-size:13px;margin-bottom:32px}
.login-box .form-group{text-align:left;margin-bottom:16px}
.login-box .btn-primary{width:100%;height:46px;justify-content:center;margin-top:8px;font-size:15px}
.login-box .error{color:var(--red);font-size:13px;margin-top:14px;min-height:20px}
.login-box .form-input{height:46px;font-size:15px}

/* Admin mobile extras */
@media(max-width:640px){
  .page-title{font-size:22px}
  .card{padding:18px}
  .modal{padding:20px;margin:12px}
  .btn-group{gap:8px}
  .form-grid{gap:12px}
  .img-upload{aspect-ratio:1/1}
}
</style>
</head>
<body>

<!-- Login -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <div class="mark">T</div>
    <h2>Things Yönetim</h2>
    <p class="sub">Devam etmek için giriş yapın</p>
    <form onsubmit="doLogin(event)">
      <div class="form-group">
        <label class="form-label">Kullanıcı Adı</label>
        <input class="form-input" id="login_user" placeholder="admin" autocomplete="username"/>
      </div>
      <div class="form-group">
        <label class="form-label">Şifre</label>
        <input class="form-input" id="login_pass" type="password" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <button type="submit" class="btn btn-primary">Giriş Yap</button>
    </form>
    <div class="error" id="login_error"></div>
    <div style="margin-top:40px;padding-top:20px;border-top:1px solid rgba(255,255,255,.06);font-size:11px;color:var(--fg3);letter-spacing:.04em">
      Powered by <span style="color:var(--accent);font-weight:600">Lucky Studio</span>
    </div>
  </div>
</div>

<div class="shell">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="mark">T</div>
      <div>Things <span>yönetim</span></div>
    </div>
    <div class="nav-group">
      <div class="nav-group-label">Genel</div>
      <button class="nav-item active" data-page="dashboard"><span class="icon">◈</span> Genel Bakış</button>
      <button class="nav-item" data-page="settings"><span class="icon">⚙</span> Site Ayarları</button>
    </div>
    <div class="nav-group">
      <div class="nav-group-label">İçerik</div>
      <button class="nav-item" data-page="hero"><span class="icon">★</span> Ana Sayfa (Hero)</button>
      <button class="nav-item" data-page="vitrin"><span class="icon">▣</span> Vitrin Kartları</button>
      <button class="nav-item" data-page="hikaye"><span class="icon">♦</span> Hikâyemiz</button>
      <button class="nav-item" data-page="felsefe"><span class="icon">◇</span> Felsefe</button>
      <button class="nav-item" data-page="sezon"><span class="icon">❋</span> Mevsim Özel</button>
      <button class="nav-item" data-page="birgun"><span class="icon">☀</span> Bir Gün</button>
      <button class="nav-item" data-page="contact"><span class="icon">◉</span> İletişim</button>
      <button class="nav-item" data-page="social"><span class="icon">◎</span> Sosyal Medya</button>
    </div>
    <div class="nav-group">
      <div class="nav-group-label">Menü</div>
      <button class="nav-item" data-page="categories"><span class="icon">▤</span> Kategoriler</button>
      <button class="nav-item" data-page="menu"><span class="icon">▦</span> Ürünler</button>
    </div>
    <div class="nav-group">
      <div class="nav-group-label">Hesap</div>
      <button class="nav-item" data-page="password"><span class="icon">🔑</span> Şifre Değiştir</button>
      <button class="nav-item" onclick="doLogout()" style="color:var(--red)"><span class="icon">⏻</span> Çıkış Yap</button>
    </div>
    <div class="sidebar-foot">
      <a href="/" target="_blank">↗ Siteyi görüntüle</a>
    </div>
  </aside>

  <!-- Main -->
  <div style="display:flex;flex-direction:column;min-height:100vh;flex:1">
    <div class="mobile-header">
      <button class="hamburger" id="sidebarToggle" aria-label="Menü"><span></span><span></span><span></span></button>
      <div class="mark">T</div>
      <div class="title">Things Yönetim</div>
    </div>
    <main class="main" id="main"></main>
  </div>
</div>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Edit Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal" id="modal-content"></div>
</div>

<script>
let DATA = {};
let AUTH_TOKEN = localStorage.getItem("things_token") || "";
const $ = (s, p) => (p || document).querySelector(s);
const $$ = (s, p) => [...(p || document).querySelectorAll(s)];

function authHeaders(extra = {}) {
  return { "Authorization": "Bearer " + AUTH_TOKEN, ...extra };
}

// ─── Auth ───
function showLogin() {
  $("#loginOverlay").style.display = "flex";
}
function hideLogin() {
  $("#loginOverlay").style.display = "none";
}

async function checkAuth() {
  if (!AUTH_TOKEN) { showLogin(); return false; }
  try {
    const r = await fetch("/api/check-auth", { headers: authHeaders() });
    if (!r.ok) { showLogin(); return false; }
    hideLogin();
    return true;
  } catch {
    showLogin();
    return false;
  }
}

async function doLogin(e) {
  if (e) e.preventDefault();
  const user = $("#login_user").value.trim();
  const pass = $("#login_pass").value;
  const errEl = $("#login_error");
  errEl.textContent = "";

  if (!user || !pass) { errEl.textContent = "Kullanıcı adı ve şifre girin"; return; }

  try {
    const r = await fetch("/api/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username: user, password: pass })
    });
    const data = await r.json();
    if (!r.ok) {
      errEl.textContent = data.error || "Giriş başarısız";
      return;
    }
    AUTH_TOKEN = data.token;
    localStorage.setItem("things_token", AUTH_TOKEN);
    hideLogin();
    loadData().then(() => renderPage("dashboard"));
  } catch {
    errEl.textContent = "Sunucu bağlantı hatası";
  }
}

function doLogout() {
  fetch("/api/logout", { method: "POST", headers: authHeaders() });
  AUTH_TOKEN = "";
  localStorage.removeItem("things_token");
  showLogin();
  $("#login_user").value = "";
  $("#login_pass").value = "";
  $("#login_error").textContent = "";
}

// ─── Toast ───
function toast(msg, type = "success") {
  const el = $("#toast");
  el.textContent = msg;
  el.className = "toast " + type;
  requestAnimationFrame(() => el.classList.add("show"));
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove("show"), 2800);
}

// ─── API ───
async function loadData() {
  const r = await fetch("/api/data", { headers: authHeaders() });
  if (r.status === 401) { showLogin(); return; }
  DATA = await r.json();
}
const _bc = new BroadcastChannel("things_admin");
async function saveData() {
  const r = await fetch("/api/data", {
    method: "POST",
    headers: authHeaders({ "Content-Type": "application/json" }),
    body: JSON.stringify(DATA),
  });
  if (r.status === 401) { showLogin(); return; }
  if (r.ok) {
    toast("Kaydedildi");
    _bc.postMessage("reload");
  } else {
    toast("Kaydetme hatası", "error");
  }
}
async function uploadImage(file) {
  const fd = new FormData();
  fd.append("file", file);
  const r = await fetch("/api/upload", { method: "POST", body: fd, headers: authHeaders() });
  if (r.status === 401) { showLogin(); return null; }
  const j = await r.json();
  if (!r.ok) { toast(j.error || "Yükleme hatası", "error"); return null; }
  toast("Resim yüklendi");
  return j.url;
}

// ─── Modal ───
function openModal(html) {
  $("#modal-content").innerHTML = html;
  $("#modal").classList.add("open");
}
function closeModal() {
  $("#modal").classList.remove("open");
}
$("#modal").addEventListener("click", (e) => {
  if (e.target === $("#modal")) closeModal();
});

// ─── Image Upload Helper ───
function imgUploadHTML(currentUrl, id) {
  const has = currentUrl ? "has-img" : "";
  return `
    <div class="img-upload ${has}" id="${id}" onclick="document.getElementById('${id}_input').click()">
      ${currentUrl ? `<img src="${currentUrl}"/>` : ""}
      <div class="overlay">
        <button class="btn btn-sm btn-secondary" onclick="event.stopPropagation();document.getElementById('${id}_input').click()">Değiştir</button>
        ${currentUrl ? `<button class="btn btn-sm btn-danger" onclick="event.stopPropagation();removeImage('${id}')">Kaldır</button>` : ""}
      </div>
      ${!currentUrl ? `<div class="placeholder"><span class="icon">⬆</span>Resim yükle<br><small>JPG, PNG, WebP</small></div>` : ""}
      <input type="file" id="${id}_input" accept="image/*"/>
    </div>
  `;
}

// ─── Navigation ───
$$(".nav-item").forEach((btn) => {
  btn.addEventListener("click", () => {
    $$(".nav-item").forEach((b) => b.classList.remove("active"));
    btn.classList.add("active");
    renderPage(btn.dataset.page);
  });
});

// ─── Pages ───
function renderPage(page) {
  const main = $("#main");
  const fn = pages[page];
  if (fn) { main.innerHTML = ""; fn(main); }
}

const pages = {};

// ── Dashboard ──
pages.dashboard = (el) => {
  const menuCount = DATA.menu?.length || 0;
  const catCount = DATA.categories?.length || 0;
  el.innerHTML = `
    <h1 class="page-title">Genel Bakış</h1>
    <p class="page-desc">Things Pastane yönetim paneline hoş geldiniz.</p>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:28px">
      <div class="card" style="text-align:center">
        <div style="font-size:36px;font-weight:700;color:var(--accent)">${menuCount}</div>
        <div style="color:var(--fg2);font-size:13px">Menü Ürünü</div>
      </div>
      <div class="card" style="text-align:center">

function detectSocialPlatform(url) {
  url = (url || "").toLowerCase();
  const platforms = [
    { key: "instagram", patterns: ["instagram.com", "instagr.am"], label: "Instagram" },
    { key: "facebook", patterns: ["facebook.com", "fb.com", "fb.me"], label: "Facebook" },
    { key: "twitter", patterns: ["twitter.com", "x.com"], label: "X (Twitter)" },
    { key: "youtube", patterns: ["youtube.com", "youtu.be"], label: "YouTube" },
    { key: "tiktok", patterns: ["tiktok.com"], label: "TikTok" },
    { key: "linkedin", patterns: ["linkedin.com"], label: "LinkedIn" },
    { key: "pinterest", patterns: ["pinterest.com", "pin.it"], label: "Pinterest" },
    { key: "whatsapp", patterns: ["wa.me", "whatsapp.com", "api.whatsapp.com"], label: "WhatsApp" },
    { key: "telegram", patterns: ["t.me", "telegram.me", "telegram.org"], label: "Telegram" },
    { key: "spotify", patterns: ["spotify.com", "open.spotify.com"], label: "Spotify" },
    { key: "threads", patterns: ["threads.net"], label: "Threads" },
    { key: "snapchat", patterns: ["snapchat.com"], label: "Snapchat" },
    { key: "discord", patterns: ["discord.gg", "discord.com"], label: "Discord" },
    { key: "github", patterns: ["github.com"], label: "GitHub" },
    { key: "dribbble", patterns: ["dribbble.com"], label: "Dribbble" },
    { key: "behance", patterns: ["behance.net"], label: "Behance" },
    { key: "twitch", patterns: ["twitch.tv"], label: "Twitch" },
    { key: "reddit", patterns: ["reddit.com"], label: "Reddit" },
  ];
  for (const p of platforms) {
    if (p.patterns.some(pat => url.includes(pat))) return p;
  }
  return null;
}
function socialFaviconURL(url) {
  try {
    const host = new URL(url).hostname;
    return `https://www.google.com/s2/favicons?domain=${host}&sz=64`;
  } catch { return ""; }
}

async function changePassword() {
  const oldPw = $("#pw_old").value;
  const newPw = $("#pw_new").value;
  const confirmPw = $("#pw_confirm").value;

  if (!oldPw) { toast("Mevcut şifrenizi girin", "error"); return; }
  if (!newPw) { toast("Yeni şifre girin", "error"); return; }
  if (newPw.length < 6) { toast("Şifre en az 6 karakter olmalı", "error"); return; }
  if (newPw !== confirmPw) { toast("Şifreler eşleşmiyor", "error"); return; }

  try {
    const r = await fetch("/api/change-password", {
      method: "POST",
      headers: authHeaders({ "Content-Type": "application/json" }),
      body: JSON.stringify({ oldPassword: oldPw, newPassword: newPw })
    });
    const data = await r.json();
    if (r.ok) {
      AUTH_TOKEN = data.token;
      localStorage.setItem("things_token", AUTH_TOKEN);
      toast("Şifre başarıyla güncellendi");
      renderPage("password");
    } else {
      toast(data.error || "Şifre değiştirilemedi", "error");
    }
  } catch {
    toast("Sunucu hatası", "error");
  }
}

// ─── Drag & Drop reorder (mouse-based) ───
(function() {
  let srcRow = null, srcIdx = null, listName = null;
  let ghost = null, placeholder = null;
  let siblings = [], startY = 0;

  function getArr(list) {
    if (list === "birgun") return DATA.birgun?.cards;
    if (list === "sezon") return DATA.sezon?.items;
    if (list === "categories") return DATA.categories;
    if (list === "menu") return DATA.menu;
    if (list === "social") return DATA.social;
    return null;
  }

  document.addEventListener("mousedown", (e) => {
    const handle = e.target.closest(".drag-handle");
    if (!handle) return;
    const row = handle.closest("[data-list]");
    if (!row) return;
    e.preventDefault();

    srcRow = row;
    srcIdx = parseInt(row.dataset.idx);
    listName = row.dataset.list;
    startY = e.clientY;

    // Collect siblings
    const parent = row.parentNode;
    siblings = Array.from(parent.querySelectorAll(`[data-list="${listName}"]`));

    // Create ghost
    ghost = row.cloneNode(true);
    ghost.className = (row.className.replace(/drag-over-\w+/g, "").trim()) + " drag-ghost";
    ghost.style.width = row.offsetWidth + "px";
    ghost.style.left = row.getBoundingClientRect().left + "px";
    ghost.style.top = row.getBoundingClientRect().top + "px";
    document.body.appendChild(ghost);

    // Mark source
    row.classList.add("dragging");
    document.body.classList.add("is-dragging");

    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup", onUp);
  });

  function onMove(e) {
    if (!ghost) return;
    const dy = e.clientY - startY;
    const srcRect = srcRow.getBoundingClientRect();
    ghost.style.top = (srcRect.top + dy) + "px";

    // Clear old indicators
    siblings.forEach(s => s.classList.remove("drag-over-above", "drag-over-below"));

    // Find which sibling we're over
    for (const sib of siblings) {
      if (sib === srcRow) continue;
      const rect = sib.getBoundingClientRect();
      const midY = rect.top + rect.height / 2;
      if (e.clientY > rect.top && e.clientY < rect.bottom) {
        if (e.clientY < midY) {
          sib.classList.add("drag-over-above");
        } else {
          sib.classList.add("drag-over-below");
        }
        break;
      }
    }
  }

  function onUp(e) {
    document.removeEventListener("mousemove", onMove);
    document.removeEventListener("mouseup", onUp);
    if (!ghost) return;

    // Find drop target
    let dropIdx = srcIdx;
    for (const sib of siblings) {
      if (sib === srcRow) continue;
      const rect = sib.getBoundingClientRect();
      const midY = rect.top + rect.height / 2;
      if (e.clientY > rect.top && e.clientY < rect.bottom) {
        const sibIdx = parseInt(sib.dataset.idx);
        dropIdx = e.clientY < midY ? sibIdx : sibIdx + (sibIdx > srcIdx ? 0 : 1);
        if (dropIdx > srcIdx) dropIdx--;
        break;
      }
    }

    // Cleanup
    ghost.remove();
    ghost = null;
    srcRow.classList.remove("dragging");
    siblings.forEach(s => s.classList.remove("drag-over-above", "drag-over-below"));
    document.body.classList.remove("is-dragging");

    if (dropIdx === srcIdx) { srcRow = null; return; }

    // For lists with input fields, save current values first
    if (listName === "social") {
      const urls = document.querySelectorAll(".social_url");
      const labels = document.querySelectorAll(".social_label");
      DATA.social = DATA.social.map((s, i) => ({
        ...s,
        url: urls[i]?.value || s.url || "",
        label: labels[i]?.value || "",
      }));
    }
    if (listName === "categories") {
      const cats = [];
      document.querySelectorAll(".cat_id").forEach((el, i) => {
        cats.push({ id: el.value, name: document.querySelectorAll(".cat_name")[i].value });
      });
      DATA.categories = cats;
    }

    const arr = getArr(listName);
    if (!arr) return;
    const item = arr.splice(srcIdx, 1)[0];
    arr.splice(dropIdx, 0, item);
    saveData();
    renderPage(listName);
    srcRow = null;
  }
})();

// ─── Nav helper ───
window.navTo = function(page) {
  $$(".nav-item").forEach(b => {
    b.classList.toggle("active", b.dataset.page === page);
  });
  renderPage(page);
};

// ─── Mobile sidebar toggle ───
const sidebarToggle = document.getElementById("sidebarToggle");
const sidebarEl = document.querySelector(".sidebar");
const sidebarOverlay = document.getElementById("sidebarOverlay");

function openSidebar() {
  sidebarEl.classList.add("open");
  sidebarOverlay.classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeSidebar() {
  sidebarEl.classList.remove("open");
  sidebarOverlay.classList.remove("open");
  document.body.style.overflow = "";
}
if (sidebarToggle) sidebarToggle.addEventListener("click", openSidebar);
if (sidebarOverlay) sidebarOverlay.addEventListener("click", closeSidebar);

// Close sidebar when navigating on mobile
$$(".nav-item").forEach((btn) => {
  btn.addEventListener("click", () => {
    if (window.innerWidth <= 860) closeSidebar();
  });
});

// ─── Init ───
checkAuth().then((ok) => {
  if (ok) loadData().then(() => renderPage("dashboard"));
});
</script>
